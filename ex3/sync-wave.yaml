
# ---------- PreSync : wave 1 ----------
# delete-policy HookSucceeded -> the Job is removed automatically once it succeeds
apiVersion: batch/v1
kind: Job
metadata:
  name: presync-1-backup
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: backup
          image: alpine:latest
          command: ["sh", "-c", "echo 'PreSync / wave 1 -> backup database'; sleep 5"]
---
# ---------- PreSync : wave 2 ----------
apiVersion: batch/v1
kind: Job
metadata:
  name: presync-2-migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: alpine:latest
          command: ["sh", "-c", "echo 'PreSync / wave 2 -> run schema migration'; sleep 5"]
---
# ---------- Sync hook : wave 1 ----------
# delete-policy BeforeHookCreation -> old Job is deleted right before the next run
# (keeps the most recent one around so you can inspect it)
apiVersion: batch/v1
kind: Job
metadata:
  name: sync-hook-1-maint-up
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: maint-up
          image: alpine:latest
          command: ["sh", "-c", "echo 'Sync hook / wave 1 -> put up maintenance page'; sleep 3"]
---
# ---------- Sync resource : wave 2 (backend) ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      tier: backend
  template:
    metadata:
      labels:
        tier: backend
    spec:
      containers:
        - name: main
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    tier: backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 80
---
# ---------- Sync resource : wave 3 (frontend, depends on backend) ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      tier: frontend
  template:
    metadata:
      labels:
        tier: frontend
    spec:
      containers:
        - name: main
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  selector:
    tier: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
# ---------- Sync hook : wave 4 ----------
apiVersion: batch/v1
kind: Job
metadata:
  name: sync-hook-2-maint-down
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: maint-down
          image: alpine:latest
          command: ["sh", "-c", "echo 'Sync hook / wave 4 -> take down maintenance page'; sleep 3"]
---
# ---------- PostSync : wave 1 ----------
apiVersion: batch/v1
kind: Job
metadata:
  name: postsync-1-smoke-test
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: smoke-test
          image: alpine:latest
          command: ["sh", "-c", "echo 'PostSync / wave 1 -> run smoke tests'; sleep 5"]
---
# ---------- PostSync : wave 2 ----------
apiVersion: batch/v1
kind: Job
metadata:
  name: postsync-2-notify
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: notify
          image: alpine:latest
          command: ["sh", "-c", "echo 'PostSync / wave 2 -> notify Slack + warm cache'; sleep 3"]
---
# ---------- SyncFail : wave 1 ----------
# Runs ONLY when the sync operation fails. See the optional force-failure Job at the bottom.
apiVersion: batch/v1
kind: Job
metadata:
  name: syncfail-1-rollback
  annotations:
    argocd.argoproj.io/hook: SyncFail
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: rollback
          image: alpine:latest
          command: ["sh", "-c", "echo 'SyncFail / wave 1 -> roll back release'; sleep 3"]
---
# ---------- SyncFail : wave 2 ----------
apiVersion: batch/v1
kind: Job
metadata:
  name: syncfail-2-alert
  annotations:
    argocd.argoproj.io/hook: SyncFail
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: alert
          image: alpine:latest
          command: ["sh", "-c", "echo 'SyncFail / wave 2 -> page the on-call engineer'; sleep 3"]
